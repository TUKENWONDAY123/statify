<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse — Social</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c27;
      --border: rgba(255,255,255,0.07); --accent: #ff3c6f;
      --accent2: #7c3aff; --accent3: #00e5c4; --text: #f0f0f8; --muted: #6b6b85;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 2000; opacity: 0.45;
    }

    /* ══════════════════════════════════════
       AUTH SPLASH SCREEN
    ══════════════════════════════════════ */
    #splashOverlay {
      position: fixed; inset: 0; z-index: 1800;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    #splashOverlay.hiding { animation: splashOut 0.45s ease both; }
    @keyframes splashOut { from{opacity:1;transform:scale(1)} to{opacity:0;transform:scale(1.03);pointer-events:none} }
    .splash-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 28px; padding: 2.4rem 2rem; width: 380px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(124,58,255,0.12);
      animation: splashIn 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
      text-align: center;
    }
    @keyframes splashIn { from{opacity:0;transform:translateY(28px) scale(0.94)} to{opacity:1;transform:none} }
    .splash-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2.2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -0.04em; margin-bottom: 0.25rem;
    }
    .splash-logo span { -webkit-text-fill-color: var(--accent3); }
    .splash-tagline { font-size: 0.83rem; color: var(--muted); margin-bottom: 1.8rem; }
    /* Tab switcher */
    .auth-tabs { display: flex; gap: 0.25rem; background: var(--surface2); border-radius: 12px; padding: 0.25rem; margin-bottom: 1.5rem; }
    .auth-tab { flex: 1; background: transparent; border: none; border-radius: 9px; padding: 0.5rem; color: var(--muted); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; }
    .auth-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }
    .splash-label {
      font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);
      text-align: left; display: block; margin-bottom: 0.4rem;
    }
    .splash-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.82rem 1rem; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none;
      margin-bottom: 0.85rem; transition: border-color 0.25s, box-shadow 0.25s;
    }
    .splash-input:focus { border-color: rgba(124,58,255,0.5); box-shadow: 0 0 0 3px rgba(124,58,255,0.08); }
    .splash-input::placeholder { color: var(--muted); }
    .splash-err { color: var(--accent); font-size: 0.8rem; margin-bottom: 0.65rem; min-height: 1.1em; text-align: left; }
    .splash-btn {
      width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 12px; padding: 0.85rem;
      color: #fff; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.95rem;
      cursor: pointer; letter-spacing: 0.02em;
      transition: transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden;
    }
    .splash-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,58,255,0.45); }
    .splash-btn:active { transform: none; }
    .splash-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Floating orbs behind splash */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 1700;
    }
    .orb1 { width: 400px; height: 400px; background: rgba(124,58,255,0.12); top: -100px; left: -100px; animation: drift1 12s ease-in-out infinite; }
    .orb2 { width: 350px; height: 350px; background: rgba(255,60,111,0.1); bottom: -80px; right: -80px; animation: drift2 15s ease-in-out infinite; }
    .orb3 { width: 250px; height: 250px; background: rgba(0,229,196,0.08); top: 50%; left: 50%; transform: translate(-50%,-50%); animation: drift3 10s ease-in-out infinite; }
    @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }
    @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-25px,-20px)} }
    @keyframes drift3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.15)} }

    /* ══════════════════════════════════════
       NAV
    ══════════════════════════════════════ */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 900; height: 62px;
      display: flex; align-items: center; justify-content: space-between; padding: 0 2rem;
      background: rgba(10,10,15,0.88); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border);
    }
    .nav-left { display: flex; align-items: center; gap: 1rem; }
    .nav-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.45rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -0.03em; cursor: pointer;
    }
    .nav-logo span { -webkit-text-fill-color: var(--accent3); }
    .nav-tabs { display: flex; gap: 0.2rem; }
    .nav-tab {
      background: transparent; border: none; border-radius: 9px; padding: 0.45rem 1rem;
      color: var(--muted); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem;
      cursor: pointer; transition: all 0.2s;
    }
    .nav-tab:hover { background: var(--surface2); color: var(--text); }
    .nav-tab.active { background: var(--surface2); }
    .nav-tab.home-tab.active { color: var(--accent3); }
    .nav-tab.polls-tab.active { color: #a78bfa; }
    .nav-right { display: flex; align-items: center; gap: 0.65rem; }

    /* Username pill in nav */
    .nav-user {
      display: flex; align-items: center; gap: 0.55rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 0.28rem 0.75rem 0.28rem 0.28rem;
    }
    .nav-av {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .nav-name { font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .admin-btn {
      background: transparent; border: 1px solid var(--border); border-radius: 8px;
      padding: 0.32rem 0.8rem; color: var(--muted);
      font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.4rem;
    }
    .admin-btn:hover { border-color: rgba(255,60,111,0.4); color: var(--text); }
    .admin-badge {
      display: none; align-items: center; gap: 0.5rem;
      background: rgba(255,60,111,0.1); border: 1px solid rgba(255,60,111,0.3);
      border-radius: 8px; padding: 0.32rem 0.8rem;
      font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700; color: var(--accent);
    }
    .admin-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .admin-badge button { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 0.75rem; line-height: 1; transition: color 0.2s; padding: 0; margin-left: 0.1rem; }
    .admin-badge button:hover { color: var(--text); }

    /* ══════════════════════════════════════
       PAGES
    ══════════════════════════════════════ */
    .page { display: none; }
    .page.active { display: block; }
    .page-wrap { max-width: 680px; margin: 0 auto; padding: 82px 1.5rem 5rem; }

    /* ══════════════════════════════════════
       COMPOSE
    ══════════════════════════════════════ */
    .compose-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 22px;
      padding: 1.35rem; margin-bottom: 1.5rem; animation: fadeUp 0.4s ease both;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .compose-card:focus-within { border-color: rgba(124,58,255,0.35); box-shadow: 0 0 0 4px rgba(124,58,255,0.05), 0 10px 40px rgba(0,0,0,0.4); }
    .compose-top { display: flex; gap: 0.9rem; align-items: flex-start; }
    .compose-avatar {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem;
    }
    .compose-who {
      font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700;
      color: var(--text); margin-bottom: 0.5rem;
    }
    .compose-who span { color: var(--muted); font-weight: 400; font-size: 0.78rem; margin-left: 0.35rem; }
    .compose-inputs { flex: 1; }
    .compose-textarea {
      width: 100%; background: transparent; border: none; resize: none;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 1rem; line-height: 1.6; outline: none; min-height: 72px;
    }
    .compose-textarea::placeholder { color: var(--muted); }
    .compose-footer {
      display: flex; align-items: center; gap: 0.5rem;
      padding-top: 0.9rem; border-top: 1px solid var(--border); margin-top: 0.6rem;
    }
    .compose-tool { width: 34px; height: 34px; border-radius: 8px; background: transparent; border: none; cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .compose-tool:hover { background: var(--surface2); color: var(--accent2); }
    .char-count { font-size: 0.78rem; color: var(--muted); margin-left: 0.25rem; }
    .char-count.warn { color: #f59e0b; }
    .char-count.over { color: var(--accent); }
    .post-btn {
      margin-left: auto; background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 11px; padding: 0.58rem 1.4rem; color: #fff;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
      cursor: pointer; letter-spacing: 0.02em; transition: transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden;
    }
    .post-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg,rgba(255,255,255,0.14),transparent); opacity: 0; transition: opacity 0.2s; }
    .post-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(124,58,255,0.4); }
    .post-btn:hover::after { opacity: 1; }
    .post-btn:active { transform: none; }

    /* ══════════════════════════════════════
       FEED TABS
    ══════════════════════════════════════ */
    .feed-tabs { display: flex; gap: 0.25rem; padding: 0.3rem; background: var(--surface); border: 1px solid var(--border); border-radius: 15px; margin-bottom: 1.25rem; animation: fadeUp 0.4s 0.05s ease both; }
    .ftab { flex: 1; background: transparent; border: none; border-radius: 11px; padding: 0.55rem; color: var(--muted); font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
    .ftab.active { background: var(--surface2); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

    /* ══════════════════════════════════════
       POST CARD
    ══════════════════════════════════════ */
    .post-card { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; overflow: hidden; margin-bottom: 1.1rem; animation: fadeUp 0.4s ease both; transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s; position: relative; }
    .post-card:hover { border-color: rgba(124,58,255,0.18); box-shadow: 0 4px 28px rgba(0,0,0,0.45); transform: translateY(-2px); }
    .post-card.pinned { border-color: rgba(255,60,111,0.22); background: linear-gradient(180deg, rgba(255,60,111,0.04) 0%, var(--surface) 70px); }
    .pin-label { display: flex; align-items: center; gap: 0.35rem; padding: 0.5rem 1.3rem 0; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--accent); }
    .post-body { padding: 1.15rem 1.3rem; }
    .post-header { display: flex; align-items: flex-start; gap: 0.8rem; margin-bottom: 0.8rem; }
    .post-avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; color: #fff; position: relative; }
    .post-avatar::after { content: ''; position: absolute; inset: -2px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); z-index: -1; opacity: 0; transition: opacity 0.2s; }
    .post-card:hover .post-avatar::after { opacity: 1; }
    .post-meta { flex: 1; min-width: 0; }
    .post-author { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.96rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-time { font-size: 0.77rem; color: var(--muted); margin-top: 2px; }
    .post-menu { background: transparent; border: none; color: var(--muted); cursor: pointer; width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .post-menu:hover { background: var(--surface2); color: var(--text); }
    .post-content { font-size: 0.96rem; line-height: 1.68; color: #d0d0e8; margin-bottom: 1rem; word-break: break-word; }
    .post-content .ht { color: var(--accent2); font-weight: 500; cursor: pointer; }
    .post-content .ht:hover { text-decoration: underline; }
    .post-actions { display: flex; align-items: center; gap: 0.2rem; padding-top: 0.8rem; border-top: 1px solid var(--border); }
    .act { display: flex; align-items: center; gap: 0.4rem; background: transparent; border: none; border-radius: 8px; padding: 0.45rem 0.75rem; color: var(--muted); font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .act:hover { background: rgba(255,255,255,0.04); }
    .act.like:hover, .act.like.on { color: var(--accent); }
    .act.like.on svg { fill: var(--accent); stroke: var(--accent); }
    .act.comment:hover { color: var(--accent3); }
    .act.share:hover { color: var(--accent2); }
    .act.pin:hover, .act.pin.on { color: #f59e0b; }
    .act.pin.on svg { fill: #f59e0b; stroke: #f59e0b; }
    .act-spacer { flex: 1; }
    @keyframes heartPop { 0%{transform:scale(1)} 30%{transform:scale(1.45)} 65%{transform:scale(0.9)} 100%{transform:scale(1)} }
    .act.like.popping svg { animation: heartPop 0.38s ease both; }

    .post-dropdown { position: absolute; top: 0.85rem; right: 0.85rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 13px; min-width: 155px; box-shadow: 0 10px 35px rgba(0,0,0,0.55); z-index: 200; display: none; animation: dropIn 0.15s ease both; overflow: hidden; }
    .post-dropdown.open { display: block; }
    @keyframes dropIn { from{opacity:0;transform:translateY(-6px) scale(0.97)} to{opacity:1;transform:none} }
    .dd-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.68rem 1rem; cursor: pointer; font-size: 0.83rem; color: var(--text); transition: background 0.15s; }
    .dd-item:hover { background: rgba(255,255,255,0.05); }
    .dd-item.red { color: var(--accent); }

    .comments-wrap { border-top: 1px solid var(--border); padding: 0.9rem 1.3rem; display: none; flex-direction: column; gap: 0.8rem; }
    .comments-wrap.open { display: flex; animation: slideDown 0.22s ease both; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }
    .comment-row { display: flex; gap: 0.65rem; animation: fadeUp 0.2s ease both; }
    .c-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; color: #fff; }
    .c-bubble { background: var(--surface2); border-radius: 12px 12px 12px 3px; padding: 0.55rem 0.9rem; flex: 1; min-width: 0; position: relative; }
    .c-name { font-family: 'Syne',sans-serif; font-size: 0.79rem; font-weight: 700; margin-bottom: 0.1rem; }
    .c-text { font-size: 0.84rem; color: #b0b0cc; line-height: 1.5; }
    /* ── DELETE COMMENT BUTTON ── */
    .c-delete {
      position: absolute; top: 0.4rem; right: 0.5rem;
      background: transparent; border: none; cursor: pointer;
      color: var(--muted); width: 22px; height: 22px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s; opacity: 0;
    }
    .c-bubble:hover .c-delete { opacity: 1; }
    .c-delete:hover { background: rgba(255,60,111,0.12); color: var(--accent); }
    .c-input-row { display: flex; gap: 0.6rem; align-items: center; }
    .c-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 0.52rem 1rem; color: var(--text); font-family: 'DM Sans',sans-serif; font-size: 0.85rem; outline: none; transition: border-color 0.2s; }
    .c-input:focus { border-color: rgba(124,58,255,0.4); }
    .c-input::placeholder { color: var(--muted); }
    .c-send { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; transition: transform 0.2s, box-shadow 0.2s; }
    .c-send:hover { transform: scale(1.1); box-shadow: 0 4px 14px rgba(124,58,255,0.4); }

    .feed-div { display: flex; align-items: center; gap: 0.75rem; color: var(--muted); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1.1rem; animation: fadeUp 0.4s ease both; }
    .feed-div::before,.feed-div::after { content:''; flex:1; height:1px; background: var(--border); }
    .empty { text-align: center; padding: 4rem 1rem; color: var(--muted); animation: fadeUp 0.4s ease both; }
    .empty .icon { font-size: 2.8rem; margin-bottom: 0.8rem; }
    .empty p { font-size: 0.88rem; }
    .post-card:nth-child(1){animation-delay:.04s} .post-card:nth-child(2){animation-delay:.08s}
    .post-card:nth-child(3){animation-delay:.12s} .post-card:nth-child(4){animation-delay:.16s}
    .post-card:nth-child(5){animation-delay:.20s}

    /* ══════════════════════════════════════
       POLLS PAGE
    ══════════════════════════════════════ */
    .polls-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; animation: fadeUp 0.4s ease both; }
    .polls-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; background: linear-gradient(135deg, #a78bfa, var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .create-poll-btn { display: none; align-items: center; gap: 0.4rem; background: linear-gradient(135deg, var(--accent2), #4f46e5); border: none; border-radius: 11px; padding: 0.58rem 1.2rem; color: #fff; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.83rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .create-poll-btn.visible { display: flex; }
    .create-poll-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(124,58,255,0.4); }

    .poll-card { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; overflow: hidden; margin-bottom: 1.1rem; animation: fadeUp 0.4s ease both; transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s; }
    .poll-card:hover { border-color: rgba(124,58,255,0.2); box-shadow: 0 4px 28px rgba(0,0,0,0.4); transform: translateY(-2px); }

    /* Poll image */
    .poll-image-wrap { width: 100%; max-height: 280px; overflow: hidden; }
    .poll-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .poll-card-body { padding: 1.4rem; }
    .poll-top { display: flex; align-items: flex-start; gap: 0.8rem; margin-bottom: 1.1rem; }
    .poll-icon { width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0; background: linear-gradient(135deg, var(--accent2), #4f46e5); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    .poll-meta { flex: 1; }
    .poll-q { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.02rem; line-height: 1.4; margin-bottom: 0.25rem; }
    .poll-info { font-size: 0.76rem; color: var(--muted); }
    .poll-del { background: transparent; border: none; color: var(--muted); cursor: pointer; width: 30px; height: 30px; border-radius: 7px; display: none; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .poll-del.visible { display: flex; }
    .poll-del:hover { background: rgba(255,60,111,0.1); color: var(--accent); }

    .poll-options { display: flex; flex-direction: column; gap: 0.65rem; margin-bottom: 1rem; }
    .poll-option { position: relative; border-radius: 11px; overflow: hidden; border: 1.5px solid var(--border); cursor: pointer; transition: border-color 0.2s, transform 0.15s; background: var(--surface2); user-select: none; }
    .poll-option:hover:not(.voted) { border-color: rgba(124,58,255,0.4); transform: scale(1.01); }
    .poll-option.voted { cursor: default; }
    .poll-option.is-chosen { border-color: var(--accent2); }
    .poll-option.is-winner { border-color: var(--accent3); }
    .poll-bar { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(124,58,255,0.18) 0%, transparent 100%); transform-origin: left; transform: scaleX(0); transition: transform 0.7s cubic-bezier(0.34,1.56,0.64,1); }
    .poll-option.is-winner .poll-bar { background: linear-gradient(90deg, rgba(0,229,196,0.18) 0%, transparent 100%); }
    .poll-option-inner { position: relative; z-index: 1; display: flex; align-items: center; padding: 0.78rem 1rem; gap: 0.75rem; }
    .poll-radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--muted); flex-shrink: 0; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .poll-option.is-chosen .poll-radio { border-color: var(--accent2); background: var(--accent2); }
    .poll-option.is-winner .poll-radio { border-color: var(--accent3); background: var(--accent3); }
    .poll-radio::after { content: ''; width: 7px; height: 7px; border-radius: 50%; background: #fff; opacity: 0; transition: opacity 0.2s; }
    .poll-option.is-chosen .poll-radio::after, .poll-option.is-winner .poll-radio::after { opacity: 1; }
    .poll-opt-text { flex: 1; font-size: 0.9rem; font-weight: 500; }
    .poll-pct { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem; color: var(--muted); min-width: 3ch; text-align: right; opacity: 0; transition: opacity 0.3s; }
    .poll-pct.show { opacity: 1; }
    .poll-footer { display: flex; align-items: center; gap: 0.6rem; font-size: 0.77rem; color: var(--muted); flex-wrap: wrap; }
    .poll-footer-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }

    /* Voter list (admin only) */
    .voter-list {
      margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 0.9rem;
      display: none;
    }
    .voter-list.open { display: block; }
    .voter-list-title {
      font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); margin-bottom: 0.65rem;
    }
    .voter-option-group { margin-bottom: 0.75rem; }
    .voter-option-name {
      font-size: 0.8rem; font-weight: 700; color: var(--text); margin-bottom: 0.35rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .voter-option-name .vcount {
      background: var(--surface2); border-radius: 20px; padding: 0.1rem 0.5rem;
      font-size: 0.7rem; color: var(--muted); font-weight: 600;
    }
    .voter-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .voter-chip {
      display: flex; align-items: center; gap: 0.35rem;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
      padding: 0.25rem 0.4rem 0.25rem 0.3rem; font-size: 0.78rem; color: var(--text);
      transition: border-color 0.2s;
    }
    .voter-chip:hover { border-color: rgba(255,60,111,0.3); }
    .voter-chip-av { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.52rem; font-weight: 700; color: #fff; }
    .voter-chip-name { padding: 0 0.2rem; }
    .voter-chip-del {
      width: 16px; height: 16px; border-radius: 50%; background: transparent; border: none;
      cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; line-height: 1; transition: all 0.18s; flex-shrink: 0; padding: 0;
    }
    .voter-chip-del:hover { background: rgba(255,60,111,0.2); color: var(--accent); }
    .voter-empty { font-size: 0.78rem; color: var(--muted); font-style: italic; }

    .toggle-voters-btn {
      background: transparent; border: 1px solid var(--border); border-radius: 8px;
      padding: 0.3rem 0.8rem; color: var(--muted);
      font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; margin-top: 0.1rem;
    }
    .toggle-voters-btn:hover { background: var(--surface2); color: var(--text); border-color: rgba(124,58,255,0.3); }

    /* Create Poll Form */
    .create-poll-form { background: var(--surface); border: 1px solid rgba(124,58,255,0.25); border-radius: 22px; padding: 1.5rem; margin-bottom: 1.5rem; display: none; animation: fadeUp 0.3s ease both; box-shadow: 0 0 0 4px rgba(124,58,255,0.05); }
    .create-poll-form.open { display: block; }
    .cpf-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; margin-bottom: 1.1rem; color: #a78bfa; }
    .cpf-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); margin-bottom: 0.4rem; display: block; }
    .cpf-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 11px; padding: 0.7rem 1rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.92rem; outline: none; margin-bottom: 1rem; transition: border-color 0.2s; }
    .cpf-input:focus { border-color: rgba(124,58,255,0.45); }
    .cpf-input::placeholder { color: var(--muted); }
    .cpf-options { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.75rem; }
    .cpf-opt-row { display: flex; flex-direction: column; gap: 0.4rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 13px; padding: 0.75rem; transition: border-color 0.2s; }
    .cpf-opt-row:focus-within { border-color: rgba(124,58,255,0.35); }
    .cpf-opt-row-top { display: flex; gap: 0.5rem; align-items: center; }
    .cpf-opt-input { flex: 1; background: transparent; border: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; }
    .cpf-opt-input::placeholder { color: var(--muted); }
    .cpf-opt-img-btn {
      width: 28px; height: 28px; border-radius: 7px; background: transparent;
      border: 1px solid var(--border); color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: all 0.2s; position: relative; overflow: hidden;
    }
    .cpf-opt-img-btn input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .cpf-opt-img-btn:hover { border-color: rgba(124,58,255,0.5); color: #a78bfa; }
    .cpf-opt-img-btn.has-img { border-color: var(--accent3); color: var(--accent3); }
    .cpf-remove { width: 28px; height: 28px; border-radius: 7px; background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
    .cpf-remove:hover { border-color: var(--accent); color: var(--accent); }
    .cpf-opt-img-preview { display: none; position: relative; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
    .cpf-opt-img-preview.show { display: block; }
    .cpf-opt-img-preview img { width: 100%; max-height: 120px; object-fit: cover; display: block; }
    .cpf-opt-img-preview-remove { position: absolute; top: 0.3rem; right: 0.3rem; background: rgba(0,0,0,0.65); border: none; border-radius: 6px; width: 24px; height: 24px; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; transition: background 0.2s; }
    .cpf-opt-img-preview-remove:hover { background: rgba(255,60,111,0.75); }
    .poll-options.has-images { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .poll-option.with-image .poll-option-inner { flex-direction: column; padding: 0; gap: 0; align-items: stretch; }
    .poll-opt-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; border-radius: 11px 11px 0 0; }
    .poll-opt-img-label { display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 0.8rem; }
    .poll-opt-img-label .poll-opt-text { font-size: 0.85rem; }
    .poll-opt-img-label .poll-pct { font-size: 0.78rem; }
    @media (max-width: 480px) { .poll-options.has-images { grid-template-columns: 1fr; } }
    .add-opt-btn { background: transparent; border: 1px dashed rgba(124,58,255,0.3); border-radius: 10px; padding: 0.55rem 1rem; color: #a78bfa; font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; width: 100%; transition: all 0.2s; margin-bottom: 1.1rem; }
    .add-opt-btn:hover { background: rgba(124,58,255,0.08); border-style: solid; }

    /* ── POLL IMAGE UPLOAD ── */
    .cpf-image-section { margin-bottom: 1.1rem; }
    .cpf-image-drop {
      width: 100%; border: 1.5px dashed rgba(124,58,255,0.3); border-radius: 12px;
      padding: 1.2rem 1rem; cursor: pointer; transition: all 0.2s; text-align: center;
      background: transparent; position: relative; overflow: hidden;
    }
    .cpf-image-drop:hover, .cpf-image-drop.drag-over {
      border-color: rgba(124,58,255,0.6); background: rgba(124,58,255,0.05);
    }
    .cpf-image-drop input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .cpf-image-drop-inner { pointer-events: none; display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
    .cpf-image-drop-icon { font-size: 1.6rem; }
    .cpf-image-drop-text { font-size: 0.82rem; color: var(--muted); }
    .cpf-image-drop-text strong { color: #a78bfa; }
    .cpf-image-preview {
      display: none; position: relative; border-radius: 10px; overflow: hidden;
      border: 1px solid var(--border); margin-top: 0.5rem;
    }
    .cpf-image-preview.show { display: block; }
    .cpf-image-preview img { width: 100%; max-height: 180px; object-fit: cover; display: block; }
    .cpf-image-remove {
      position: absolute; top: 0.5rem; right: 0.5rem;
      background: rgba(0,0,0,0.65); border: none; border-radius: 7px;
      width: 28px; height: 28px; cursor: pointer; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; transition: background 0.2s;
    }
    .cpf-image-remove:hover { background: rgba(255,60,111,0.75); }

    .cpf-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
    .cpf-cancel { background: transparent; border: 1px solid var(--border); border-radius: 10px; padding: 0.6rem 1.1rem; color: var(--muted); cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.83rem; transition: all 0.2s; }
    .cpf-cancel:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
    .cpf-submit { background: linear-gradient(135deg, var(--accent2), #4f46e5); border: none; border-radius: 10px; padding: 0.6rem 1.3rem; color: #fff; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.83rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .cpf-submit:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(124,58,255,0.4); }

    /* ══════════════════════════════════════
       MODALS (shared)
    ══════════════════════════════════════ */
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 1500; background: rgba(0,0,0,0.72); backdrop-filter: blur(10px); align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; width: 340px; box-shadow: 0 24px 60px rgba(0,0,0,0.65); animation: fadeUp 0.28s ease both; position: relative; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .modal-close:hover { background: var(--surface2); color: var(--text); }
    .modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.2rem; }
    .modal-sub { font-size: 0.81rem; color: var(--muted); margin-bottom: 1.4rem; }
    .modal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 11px; padding: 0.72rem 1rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; margin-bottom: 0.7rem; transition: border-color 0.2s; }
    .modal-input:focus { border-color: rgba(124,58,255,0.5); }
    .modal-err { color: var(--accent); font-size: 0.8rem; margin-bottom: 0.7rem; display: none; }
    .modal-submit { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 11px; padding: 0.72rem; color: #fff; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .modal-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,58,255,0.4); }

    /* ══════════════════════════════════════
       TOAST
    ══════════════════════════════════════ */
    /* ══════════════════════════════════════
       ROOMS PAGE
    ══════════════════════════════════════ */
    .rooms-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; animation: fadeUp 0.4s ease both; }
    .rooms-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; background: linear-gradient(135deg, #00e5c4, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .room-actions-bar { display: flex; gap: 0.6rem; }
    .room-btn { display: flex; align-items: center; gap: 0.4rem; border: none; border-radius: 11px; padding: 0.55rem 1.1rem; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.83rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .room-btn.create { background: linear-gradient(135deg, var(--accent3), #0ea5e9); color: #000; }
    .room-btn.join { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    .room-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(0,0,0,0.3); }

    /* Room list cards */
    .room-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 1.1rem 1.3rem; margin-bottom: 0.9rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; transition: all 0.22s; animation: fadeUp 0.3s ease both; }
    .room-card:hover { border-color: rgba(0,229,196,0.3); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.4); }
    .room-card-icon { width: 46px; height: 46px; border-radius: 13px; background: linear-gradient(135deg, var(--accent3), #0ea5e9); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
    .room-card-info { flex: 1; min-width: 0; }
    .room-card-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.98rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .room-card-meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem; }
    .room-card-code { font-family: monospace; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.25rem 0.6rem; font-size: 0.82rem; color: var(--accent3); letter-spacing: 0.12em; font-weight: 700; flex-shrink: 0; }
    .room-del-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
    .room-del-btn:hover { background: rgba(255,60,111,0.1); color: var(--accent); }

    /* Room chat view */
    #roomChatView { display: none; }
    #roomChatView.open { display: flex; flex-direction: column; height: calc(100vh - 130px); }
    .room-chat-header { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem; animation: fadeUp 0.3s ease both; }
    .room-back-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.45rem 0.9rem; color: var(--text); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
    .room-back-btn:hover { border-color: rgba(255,255,255,0.15); }
    .room-chat-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .room-chat-code-badge { font-family: monospace; background: rgba(0,229,196,0.1); border: 1px solid rgba(0,229,196,0.25); border-radius: 8px; padding: 0.22rem 0.6rem; font-size: 0.78rem; color: var(--accent3); letter-spacing: 0.1em; cursor: pointer; flex-shrink: 0; }
    .room-chat-code-badge:hover { background: rgba(0,229,196,0.18); }

    .room-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; padding: 0.5rem 0; margin-bottom: 0.8rem; scroll-behavior: smooth; }
    .room-messages::-webkit-scrollbar { width: 4px; }
    .room-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .room-msg { display: flex; gap: 0.6rem; animation: fadeUp 0.18s ease both; max-width: 85%; }
    .room-msg.mine { align-self: flex-end; flex-direction: row-reverse; }
    .room-msg-av { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 700; color: #fff; margin-top: 2px; }
    .room-msg-body { display: flex; flex-direction: column; gap: 0.15rem; }
    .room-msg.mine .room-msg-body { align-items: flex-end; }
    .room-msg-author { font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700; color: var(--muted); padding: 0 0.3rem; }
    .room-msg-bubble { background: var(--surface2); border-radius: 16px 16px 16px 4px; padding: 0.55rem 0.9rem; font-size: 0.88rem; line-height: 1.5; color: var(--text); position: relative; word-break: break-word; border: 1px solid var(--border); }
    .room-msg.mine .room-msg-bubble { background: linear-gradient(135deg, rgba(0,229,196,0.18), rgba(14,165,233,0.15)); border-radius: 16px 16px 4px 16px; border-color: rgba(0,229,196,0.2); }
    .room-msg-time { font-size: 0.68rem; color: var(--muted); padding: 0 0.3rem; }
    .room-msg-del { position: absolute; top: 50%; right: -26px; transform: translateY(-50%); background: transparent; border: none; color: var(--muted); cursor: pointer; width: 20px; height: 20px; border-radius: 5px; display: none; align-items: center; justify-content: center; font-size: 0.65rem; transition: all 0.15s; }
    .room-msg-bubble:hover .room-msg-del { display: flex; }
    .room-msg-del:hover { background: rgba(255,60,111,0.15); color: var(--accent); }

    .room-input-bar { display: flex; gap: 0.6rem; align-items: center; padding: 0.5rem 0; border-top: 1px solid var(--border); flex-shrink: 0; }
    .room-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 22px; padding: 0.65rem 1.1rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .room-input:focus { border-color: rgba(0,229,196,0.4); }
    .room-input::placeholder { color: var(--muted); }
    .room-send-btn { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent3), #0ea5e9); border: none; cursor: pointer; color: #000; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.2s, box-shadow 0.2s; }
    .room-send-btn:hover { transform: scale(1.1); box-shadow: 0 4px 14px rgba(0,229,196,0.4); }

    /* Create/Join modals */
    .room-modal { display: none; position: fixed; inset: 0; z-index: 1500; background: rgba(0,0,0,0.72); backdrop-filter: blur(10px); align-items: center; justify-content: center; }
    .room-modal.open { display: flex; }
    .room-modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 1.8rem; width: 340px; box-shadow: 0 24px 60px rgba(0,0,0,0.65); animation: fadeUp 0.28s ease both; }
    .room-modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.15rem; margin-bottom: 1.2rem; background: linear-gradient(135deg, var(--accent3), #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .room-modal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 11px; padding: 0.72rem 1rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.92rem; outline: none; margin-bottom: 0.85rem; transition: border-color 0.2s; }
    .room-modal-input:focus { border-color: rgba(0,229,196,0.45); }
    .room-modal-input::placeholder { color: var(--muted); }

<script>
// ════════════════════════════════════════════════════════
//  GLOBALS
// ════════════════════════════════════════════════════════
let currentUser = '';
let isAdmin = false;
let feedTab = 'all';
let posts = [];
let polls = [];
// per-option images tracked in optionImages{} object

const GRADS = [
  'linear-gradient(135deg,#ff3c6f,#ff8c42)',
  'linear-gradient(135deg,#7c3aff,#4f46e5)',
  'linear-gradient(135deg,#00e5c4,#0ea5e9)',
  'linear-gradient(135deg,#f59e0b,#ef4444)',
  'linear-gradient(135deg,#10b981,#06b6d4)',
  'linear-gradient(135deg,#ec4899,#8b5cf6)',
  'linear-gradient(135deg,#3b82f6,#60a5fa)',
  'linear-gradient(135deg,#f97316,#eab308)',
];

function grad(n) { let h=0; for(const c of(n||'?')) h=(h*31+c.charCodeAt(0))&0xffff; return GRADS[h%GRADS.length]; }
function initials(n) { return(n||'?').trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?'; }
function savePosts() { /* posts are stored server-side via API */ }
function savePolls() { /* polls stored server-side */ }
function ago(ts) {
  const d=Date.now()-ts;
  if(d<60000) return 'just now';
  if(d<3600000) return Math.floor(d/60000)+'m ago';
  if(d<86400000) return Math.floor(d/3600000)+'h ago';
  return Math.floor(d/86400000)+'d ago';
}
function esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
function rich(t) { return esc(t).replace(/#(\w+)/g,'<span class="ht">#$1</span>'); }

// ════════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════════
function toast(msg, type='ok') {
  const z = document.getElementById('toastZone');
  const icons = {ok:'✓', err:'✕', inf:'ℹ'};
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]||'ℹ'}</span>${msg}`;
  z.appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 250); }, 2800);
}

// ════════════════════════════════════════════════════════
//  AUTH — LOGIN / REGISTER / SESSION
// ════════════════════════════════════════════════════════
let sessionToken = null;

function switchAuthTab(tab) {
  document.getElementById('loginTab').classList.toggle('active', tab === 'login');
  document.getElementById('registerTab').classList.toggle('active', tab === 'register');
  document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
  document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
  document.getElementById('loginErr').textContent = '';
  document.getElementById('regErr').textContent = '';
  setTimeout(() => document.getElementById(tab === 'login' ? 'loginUser' : 'regUser').focus(), 50);
}

// Attach token to all API requests
function authFetch(url, opts = {}) {
  opts.headers = opts.headers || {};
  if (sessionToken) opts.headers['Authorization'] = 'Bearer ' + sessionToken;
  return fetch(url, opts);
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = 'Enter your username and password.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const body = await res.text();
    if (!res.ok) { errEl.textContent = body; return; }
    const user = JSON.parse(body);
    saveSession(user);
    enterApp(user);
  } catch(e) { errEl.textContent = 'Network error. Try again.'; }
  finally { btn.disabled = false; btn.textContent = 'Sign In →'; }
}

async function doRegister() {
  const username = document.getElementById('regUser').value.trim();
  const password = document.getElementById('regPass').value;
  const errEl = document.getElementById('regErr');
  const btn = document.getElementById('regBtn');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = 'Fill in both fields.'; return; }
  btn.disabled = true; btn.textContent = 'Creating…';
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const body = await res.text();
    if (!res.ok) { errEl.textContent = body; return; }
    const user = JSON.parse(body);
    saveSession(user);
    enterApp(user);
    toast('Welcome to Pulse! 🎉', 'ok');
  } catch(e) { errEl.textContent = 'Network error. Try again.'; }
  finally { btn.disabled = false; btn.textContent = 'Create Account →'; }
}

function saveSession(user) {
  sessionToken = user.token;
  localStorage.setItem('pulse_session', JSON.stringify(user));
}

function loadSession() {
  try { return JSON.parse(localStorage.getItem('pulse_session')); } catch { return null; }
}

async function logoutUser() {
  if (sessionToken) {
    await fetch('/api/auth/logout', {
      method: 'POST', headers: { 'Authorization': 'Bearer ' + sessionToken }
    }).catch(() => {});
  }
  localStorage.removeItem('pulse_session');
  location.reload();
}

function enterApp(user) {
  currentUser = user.username;
  isAdmin = !!user.is_admin;
  sessionToken = user.token || null;

  const navAv = document.getElementById('navAv');
  navAv.textContent = initials(user.username);
  navAv.style.background = grad(user.username);
  document.getElementById('navName').textContent = user.username;

  const compAv = document.getElementById('composeAv');
  compAv.textContent = initials(user.username);
  compAv.style.background = grad(user.username);
  document.getElementById('composeWho').innerHTML = 'Posting as <strong>' + esc(user.username) + '</strong>';

  if (isAdmin) {
    document.getElementById('adminBadge').style.display = 'flex';
    document.querySelector('.create-poll-btn').classList.add('visible');
    document.getElementById('usersTabBtn').style.display = '';
  }

  ['orb1','orb2','orb3'].forEach(id => document.getElementById(id).style.display='none');
  const splash = document.getElementById('splashOverlay');
  splash.classList.add('hiding');
  setTimeout(() => { splash.style.display='none'; }, 450);
  loadPosts();
  loadPolls();
}

// Auto-login: validate saved session token against server
(function() {
  // Always clear old sessions that don't have a token (pre-session format)
  const raw = localStorage.getItem('pulse_session');
  let session = null;
  try { session = raw ? JSON.parse(raw) : null; } catch(e) { session = null; }
  if (!session || !session.token) {
    localStorage.removeItem('pulse_session');
    setTimeout(() => { try { document.getElementById('loginUser').focus(); } catch(e){} }, 400);
    return;
  }
  // Validate token with server
  fetch('/api/auth/validate', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + session.token }
  }).then(async r => {
    if (r.ok) {
      const user = await r.json();
      user.token = session.token;
      enterApp(user);
    } else {
      localStorage.removeItem('pulse_session');
      setTimeout(() => { try { document.getElementById('loginUser').focus(); } catch(e){} }, 400);
      toast('Session expired. Please sign in again.', 'inf');
    }
  }).catch(() => {
    // Network error — use cached session so app still works offline
    enterApp(session);
  });
})();

function goPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(name+'Page').classList.add('active');
  const tabEl = document.querySelector('.'+name+'-tab');
  if (tabEl) tabEl.classList.add('active');
  if (name === 'polls') loadPolls();
  if (name === 'users') loadUsers();
  if (name === 'rooms') loadRooms();
}

async function loadUsers() {
  const el = document.getElementById('usersList');
  el.innerHTML = '<div class="empty"><div class="icon">⏳</div><p>Loading users…</p></div>';
  try {
    const res = await authFetch('/api/auth/users');
    if (!res.ok) throw new Error(await res.text());
    const users = await res.json();
    renderUsers(users);
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>' + esc(e.message) + '</p></div>';
  }
}

function renderUsers(users) {
  const el = document.getElementById('usersList');
  if (!users.length) {
    el.innerHTML = '<div class="empty"><div class="icon">👥</div><p>No users yet.</p></div>';
    return;
  }
  el.innerHTML = users.map(u => {
    const isSelf = u.username === currentUser;
    return '<div class="user-card">'
      + '<div class="user-card-av" style="background:' + grad(u.username) + '">' + initials(u.username) + '</div>'
      + '<div class="user-card-info">'
      + '<div class="user-card-name">' + esc(u.username)
      + (u.is_admin ? ' <span class="admin-pip">Admin</span>' : '')
      + (u.online  ? ' <span class="online-pip">● Online</span>' : '')
      + '</div>'
      + '<div class="user-card-meta">Joined ' + ago(new Date((u.created_at||'').replace(' ','T')+'Z').getTime()) + '</div>'
      + '</div>'
      + (!isSelf ? '<div class="user-card-actions">'
        + '<button class="user-action-btn show" onclick="showCreds(\'' + u.username + '\',\'' + (u.password_hash||'') + '\',this)">Show</button>'
        + '<button class="user-action-btn admin-toggle' + (u.is_admin ? ' is-admin' : '') + '" onclick="toggleAdminUser(\'' + u.username + '\',this)" title="' + (u.is_admin ? 'Remove admin' : 'Make admin') + '">' + (u.is_admin ? '★ Admin' : '☆ Admin') + '</button>'
        + '<button class="user-action-btn kick" onclick="kickUser(\'' + u.username + '\',this)" ' + (!u.online?'disabled title="Not logged in"':'') + '>Kick</button>'
        + '<button class="user-action-btn del" onclick="deleteUser(\'' + u.username + '\',this)">Delete</button>'
        + '</div>' : '<div style="font-size:0.72rem;color:var(--muted);padding:0 0.5rem">You</div>')
      + '</div>'
      + '<div class="user-creds" id="creds_' + u.username + '">'
      + '<span>Username: </span><strong>' + u.username + '</strong><br>'
      + '<span>Password: </span><strong id="pw_' + u.username + '" style="filter:blur(4px);cursor:pointer" onclick="this.style.filter=&quot;none&quot;">' + (u.password_hash||'—') + '</strong> <span style="font-size:0.7rem;color:var(--muted)">(click to reveal)</span>'
      + '</div>';
  }).join('');
}

async function toggleAdminUser(username, btn) {
  btn.disabled = true;
  try {
    const res = await authFetch('/api/auth/users/' + encodeURIComponent(username) + '/admin', { method: 'POST' });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    const isNowAdmin = data.is_admin;
    btn.textContent = isNowAdmin ? '★ Admin' : '☆ Admin';
    btn.classList.toggle('is-admin', isNowAdmin);
    btn.title = isNowAdmin ? 'Remove admin' : 'Make admin';
    toast(username + (isNowAdmin ? ' is now admin ★' : ' is no longer admin'), 'ok');
    await loadUsers();
  } catch(e) {
    toast('Failed: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

function showCreds(username, password, btn) {
  const creds = document.getElementById('creds_' + username);
  if (!creds) return;
  creds.classList.toggle('show');
  btn.textContent = creds.classList.contains('show') ? 'Hide' : 'Show';
}

async function kickUser(username, btn) {
  btn.disabled = true; btn.textContent = '…';
  try {
    const res = await authFetch('/api/auth/users/' + encodeURIComponent(username) + '/session', { method: 'DELETE' });
    if (!res.ok) throw new Error(await res.text());
    toast(username + ' has been kicked 👢', 'ok');
    await loadUsers();
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Kick';
    toast('Failed: ' + e.message, 'err');
  }
}

async function deleteUser(username, btn) {
  if (!confirm('Delete ' + username + '? This cannot be undone.')) return;
  btn.disabled = true; btn.textContent = '…';
  try {
    const res = await authFetch('/api/auth/users/' + encodeURIComponent(username), { method: 'DELETE' });
    if (!res.ok) throw new Error(await res.text());
    toast(username + ' deleted', 'inf');
    await loadUsers();
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Delete';
    toast('Failed: ' + e.message, 'err');
  }
}

let composeImageDataUrl = null;

function handleComposeImage(e) {
  const file = e.target.files[0]; if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast('Image must be under 5MB.','err'); return; }
  const reader = new FileReader();
  reader.onload = function(ev) {
    composeImageDataUrl = ev.target.result;
    document.getElementById('composeImgPreviewImg').src = composeImageDataUrl;
    document.getElementById('composeImgPreview').style.display = 'block';
    document.getElementById('composeImgBtn').style.color = 'var(--accent3)';
  };
  reader.readAsDataURL(file);
}
function removeComposeImage() {
  composeImageDataUrl = null;
  document.getElementById('composeImgPreview').style.display = 'none';
  document.getElementById('composeImgPreviewImg').src = '';
  document.getElementById('composeImgInput').value = '';
  document.getElementById('composeImgBtn').style.color = '';
}

// ════════════════════════════════════════════════════════
//  SUBMIT POST
// ════════════════════════════════════════════════════════
async function submitPost() {
  if(!currentUser) { toast('Please set your name first!','err'); return; }
  const c = document.getElementById('contentIn').value.trim();
  if(!c && !composeImageDataUrl) { toast('Write something or add an image!','err'); return; }
  const btn = document.querySelector('.post-btn');
  btn.disabled = true; btn.textContent = 'Posting…';
  try {
    const body = { author: currentUser, content: c };
    if (composeImageDataUrl) body.image = composeImageDataUrl;
    const res = await fetch('/api/posts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text());
    document.getElementById('contentIn').value='';
    document.getElementById('charCnt').textContent='0 / 500';
    removeComposeImage();
    await loadPosts();
    toast('Post published! 🎉','ok');
    document.getElementById('postsList').scrollIntoView({behavior:'smooth',block:'nearest'});
  } catch(e) {
    toast('Failed to post: ' + e.message,'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Post it';
  }
}
document.addEventListener('keydown', e => { if((e.ctrlKey||e.metaKey)&&e.key==='Enter') submitPost(); });

async function toggleLike(id) {
  if(!currentUser){ toast('Set your name first!','err'); return; }
  const p=posts.find(x=>x.id===id); if(!p) return;
  const wasLiked = p.liked;
  // Optimistic UI
  p.liked=!wasLiked; p.likes+= p.liked?1:-1;
  const card=document.querySelector(`[data-id="${id}"]`); if(!card) return;
  const btn=card.querySelector('.act.like');
  btn.querySelector('.cnt').textContent=p.likes;
  btn.classList.toggle('on',p.liked);
  btn.classList.add('popping');
  btn.addEventListener('animationend',()=>btn.classList.remove('popping'),{once:true});
  try {
    const method = p.liked ? 'POST' : 'DELETE';
    const res = await fetch(`/api/posts/${id}/like`, {
      method,
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({liker: currentUser})
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    p.likes = data.likes;
    btn.querySelector('.cnt').textContent=p.likes;
    saveMyLike(id, p.liked);
  } catch(e) {
    // Revert optimistic update on failure
    p.liked=wasLiked; p.likes+= p.liked?1:-1;
    btn.querySelector('.cnt').textContent=p.likes;
    btn.classList.toggle('on',p.liked);
    toast('Failed to like: '+e.message,'err');
  }
}

async function togglePin(id) {
  const p=posts.find(x=>x.id===id); if(!p) return;
  p.pinned=!p.pinned;
  try {
    const res = await fetch(`/api/posts/${id}/pin`, {
      method: 'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({pinned: p.pinned})
    });
    if(!res.ok) throw new Error(await res.text());
    saveMyPin(id, p.pinned);
  } catch(e) {
    p.pinned=!p.pinned; // revert
    toast('Failed to pin: '+e.message,'err'); return;
  }
  renderPosts();
  toast(p.pinned?'📌 Pinned!':'Unpinned', p.pinned?'ok':'inf');
}

async function deletePost(id) {
  const card=document.querySelector(`[data-id="${id}"]`);
  if(card){ card.style.transition='all 0.28s'; card.style.opacity='0'; card.style.transform='scale(0.95)'; }
  try {
    const res = await fetch(`/api/posts/${id}`,{
      method:'DELETE',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({requester:currentUser, admin:isAdmin})
    });
    if(!res.ok) throw new Error(await res.text());
  } catch(e) {
    if(card){ card.style.opacity='1'; card.style.transform=''; }
    toast('Failed to delete: '+e.message,'err'); return;
  }
  setTimeout(async()=>{ await loadPosts(); },290);
  toast('Post deleted','inf');
}

function toggleComments(id) {
  const w=document.querySelector(`[data-id="${id}"] .comments-wrap`);
  if(w) w.classList.toggle('open');
}

async function addComment(id) {
  if(!currentUser) { toast('Set your name first!','err'); return; }
  const inp=document.querySelector(`[data-id="${id}"] .c-input`); if(!inp) return;
  const txt=inp.value.trim(); if(!txt) return;
  inp.value='';
  try {
    const res = await fetch(`/api/posts/${id}/comments`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({author:currentUser, content:txt})
    });
    if(!res.ok) throw new Error(await res.text());
    const newComment = await res.json();
    const p=posts.find(x=>x.id===id); if(!p) return;
    p.comments.push({id:newComment.id, author:currentUser, content:txt, created_at:new Date().toISOString()});
    const list=document.querySelector(`[data-id="${id}"] .c-list`);
    if(list) list.innerHTML=commentsHtml(p);
    const cnt=document.querySelector(`[data-id="${id}"] .act.comment .cnt`);
    if(cnt) cnt.textContent=p.comments.length;
  } catch(e) {
    inp.value=txt;
    toast('Failed to comment: '+e.message,'err');
  }
}

async function deleteComment(postId, commentId) {
  const p=posts.find(x=>x.id===postId); if(!p) return;
  const comment=p.comments.find(c=>c.id===commentId); if(!comment) return;
  if(comment.author !== currentUser && !isAdmin) { toast('You can only delete your own comments.','err'); return; }
  try {
    const res = await fetch(`/api/posts/${postId}/comments/${commentId}`,{
      method:'DELETE',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({requester:currentUser, admin:isAdmin})
    });
    if(!res.ok) throw new Error(await res.text());
    p.comments=p.comments.filter(c=>c.id!==commentId);
    const list=document.querySelector(`[data-id="${postId}"] .c-list`);
    if(list) list.innerHTML=commentsHtml(p);
    const cnt=document.querySelector(`[data-id="${postId}"] .act.comment .cnt`);
    if(cnt) cnt.textContent=p.comments.length;
    toast('Comment deleted','inf');
  } catch(e) {
    toast('Failed to delete comment: '+e.message,'err');
  }
}

function sharePost(id) {
  const p=posts.find(x=>x.id===id); if(!p) return;
  const txt='"' + (p.content||'📷 image').slice(0,80) + '…" — ' + p.author + ' on Pulse';
  if(navigator.share) navigator.share({title:'Pulse',text:txt}).catch(()=>{});
  else if(navigator.clipboard) navigator.clipboard.writeText(txt).then(()=>toast('Copied!','inf'));
  else toast('Copied!','inf');
}
function toggleDrop(id,e) {
  e.stopPropagation();
  const card=document.querySelector(`[data-id="${id}"]`);
  const dd=card.querySelector('.post-dropdown');
  const was=dd.classList.contains('open');
  document.querySelectorAll('.post-dropdown.open').forEach(d=>d.classList.remove('open'));
  if(!was) dd.classList.add('open');
}
document.addEventListener('click', ()=>document.querySelectorAll('.post-dropdown.open').forEach(d=>d.classList.remove('open')));
function setFTab(btn,tab) {

function commentsHtml(post) {
  if(!post.comments || !post.comments.length) return '';
  return post.comments.map(c=>{
    const isOwn = c.author === currentUser;
    const canDelete = isOwn || isAdmin;
    const deleteBtn = canDelete
      ? `<button class="c-delete" onclick="deleteComment(${post.id},${c.id})" title="Delete comment">
           <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
         </button>`
      : '';
    const text = c.content || c.text || '';
    return `
    <div class="comment-row">
      <div class="c-avatar" style="background:${grad(c.author)}">${initials(c.author)}</div>
      <div class="c-bubble">
        <div class="c-name">${esc(c.author)}</div>
        <div class="c-text">${rich(text)}</div>
        ${deleteBtn}
      </div>
    </div>`;
  }).join('');
}

function postImageHtml(post) {
  if (!post.image) return '';
  return '<div style="margin-bottom:0.9rem;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,0.07);">'
    + '<img src="' + post.image + '" alt="" style="width:100%;max-height:320px;object-fit:cover;display:block;" loading="lazy">'
    + '</div>';
}

// ════════════════════════════════════════════════════════
//  LOAD POSTS FROM API (fully D1-connected)
// ════════════════════════════════════════════════════════
async function checkSession() {
  if (!sessionToken) return true; // not logged in yet, skip
  try {
    const r = await fetch('/api/auth/validate', {
      method: 'POST', headers: { 'Authorization': 'Bearer ' + sessionToken }
    });
    if (!r.ok) {
      localStorage.removeItem('pulse_session');
      toast('You have been logged out.', 'inf');
      setTimeout(() => location.reload(), 1500);
      return false;
    }
  } catch(e) { /* network issue, ignore */ }
  return true;
}

async function loadPosts() {
  const el = document.getElementById('postsList');
  if (!(await checkSession())) return;
  try {
    const res = await fetch('/api/posts');
    if (!res.ok) throw new Error('Server error');
    const apiPosts = await res.json();

    // Load my likes from localStorage (just to know which ones I liked)
    const myLikes = JSON.parse(localStorage.getItem('pulse_my_likes') || '{}');
    // Load my pins from localStorage (pins are per-device preference)
    const myPins = JSON.parse(localStorage.getItem('pulse_my_pins') || '{}');

    // Load comments for all posts in parallel
    const commentResults = await Promise.all(
      apiPosts.map(p => fetch(`/api/posts/${p.id}/comments`).then(r=>r.ok?r.json():[]).catch(()=>[]))
    );

    posts = apiPosts.map((p, i) => ({
      id: p.id,
      author: p.author,
      content: p.content,
      image: p.image || null,
      ts: new Date((p.created_at||'').replace(' ','T')+'Z').getTime(),
      likes: p.like_count || 0,
      liked: !!myLikes[p.id],
      pinned: p.pinned || !!myPins[p.id],
      comments: commentResults[i] || [],
    }));
  } catch(e) {
    console.warn('API unavailable:', e);
    el.innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>Could not reach the server.</p></div>';
    return;
  }
  renderPosts();
}

function saveMyLike(postId, liked) {
  const myLikes = JSON.parse(localStorage.getItem('pulse_my_likes') || '{}');
  if (liked) myLikes[postId] = true; else delete myLikes[postId];
  localStorage.setItem('pulse_my_likes', JSON.stringify(myLikes));
}

function saveMyPin(postId, pinned) {
  const myPins = JSON.parse(localStorage.getItem('pulse_my_pins') || '{}');
  if (pinned) myPins[postId] = true; else delete myPins[postId];
  localStorage.setItem('pulse_my_pins', JSON.stringify(myPins));
}

// ════════════════════════════════════════════════════════
//  RENDER POSTS
// ════════════════════════════════════════════════════════
function renderPosts() {
  const el=document.getElementById('postsList');
  let list=[...posts];
  if(feedTab==='pinned') list=list.filter(p=>p.pinned);
  else if(feedTab==='trending') list=[...list].sort((a,b)=>(b.likes+b.comments.length*2)-(a.likes+a.comments.length*2));
  else list.sort((a,b)=>(b.pinned-a.pinned)||(b.ts-a.ts));
  if(!list.length){
    const m={all:{icon:'📭',txt:'No posts yet — be the first!'},pinned:{icon:'📌',txt:'No pinned posts yet.'},trending:{icon:'🔥',txt:'Nothing trending yet.'}}[feedTab];
    el.innerHTML=`<div class="empty"><div class="icon">${m.icon}</div><p>${m.txt}</p></div>`; return;
  }
  if(feedTab==='all'){
    const pinned=list.filter(p=>p.pinned), normal=list.filter(p=>!p.pinned);
    let html=pinned.map(postHtml).join('');
    if(pinned.length&&normal.length) html+=`<div class="feed-div">Recent Posts</div>`;
    html+=normal.map(postHtml).join('');
    el.innerHTML=html;
  } else {
    el.innerHTML=list.map(postHtml).join('');
  }
  clearInterval(window._ti);
  window._ti=setInterval(()=>{
    document.querySelectorAll('.post-time').forEach(el=>{
      const id=+el.closest('.post-card').dataset.id;
      const p=posts.find(x=>x.id===id); if(p) el.textContent=ago(p.ts);
    });
  },60000);
}

// ════════════════════════════════════════════════════════
//  POLL OPTION IMAGE HANDLERS
// ════════════════════════════════════════════════════════
// optionImages[idx] = base64 data URL or null
const optionImages = {};

function handleOptImage(input, idx) {
  const file = input.files[0]; if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast('Image must be under 5MB.','err'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    optionImages[idx] = e.target.result;
    const row = input.closest('.cpf-opt-row');
    const preview = row.querySelector('.cpf-opt-img-preview');
    preview.querySelector('img').src = e.target.result;
    preview.classList.add('show');
    row.querySelector('.cpf-opt-img-btn').classList.add('has-img');
    toast('Image added to option 🖼️','ok');
  };
  reader.readAsDataURL(file);
}

function removeOptImage(btn, idx) {
  delete optionImages[idx];
  const row = btn.closest('.cpf-opt-row');
  const preview = row.querySelector('.cpf-opt-img-preview');
  preview.querySelector('img').src = '';
  preview.classList.remove('show');
  row.querySelector('.cpf-opt-img-btn').classList.remove('has-img');
  const fileInput = row.querySelector('input[type="file"]');
  if (fileInput) fileInput.value = '';
}

function resetOptImages() {
  Object.keys(optionImages).forEach(k => delete optionImages[k]);
}

function addPollOpt() {

  const idx = count;

      </button>

      </button>

function removeOptRow(btn, idx) {
  btn.closest('.cpf-opt-row').remove();

async function createPoll() {
  const q = document.getElementById('pollQ').value.trim();
  if (!q) { toast('Question is required!','err'); return; }
  const rows = [...document.querySelectorAll('#pollOpts .cpf-opt-row')];
  const options = rows.map((row, i) => ({
    text: row.querySelector('.cpf-opt-input').value.trim(),
    image: optionImages[Number(row.dataset.idx)] || null
  })).filter(o => o.text);
  if (options.length < 2) { toast('At least 2 options needed!','err'); return; }
  const btn = document.querySelector('.cpf-submit');
  btn.disabled = true; btn.textContent = 'Publishing…';
  try {
    const res = await fetch('/api/polls', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, options })
    });
    if (!res.ok) throw new Error(await res.text());
    // Reset form
    document.getElementById('pollQ').value = '';
    document.getElementById('pollOpts').innerHTML = `
      <div class="cpf-opt-row" data-idx="0">
        <div class="cpf-opt-row-top">
          <input class="cpf-opt-input" type="text" placeholder="Option 1" maxlength="100">
          <button class="cpf-opt-img-btn" title="Add image"><input type="file" accept="image/*" onchange="handleOptImage(this,0)"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
        </div>
        <div class="cpf-opt-img-preview"><img src="" alt=""><button class="cpf-opt-img-preview-remove" onclick="removeOptImage(this,0)">✕</button></div>
      </div>
      <div class="cpf-opt-row" data-idx="1">
        <div class="cpf-opt-row-top">
          <input class="cpf-opt-input" type="text" placeholder="Option 2" maxlength="100">
          <button class="cpf-opt-img-btn" title="Add image"><input type="file" accept="image/*" onchange="handleOptImage(this,1)"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
        </div>
        <div class="cpf-opt-img-preview"><img src="" alt=""><button class="cpf-opt-img-preview-remove" onclick="removeOptImage(this,1)">✕</button></div>
      </div>`;
    resetOptImages();
    togglePollForm();
    await loadPolls();
    toast('Poll published! 📊','ok');
  } catch(e) {
    toast('Failed to publish poll: '+e.message,'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Publish Poll';
  }
}

// ════════════════════════════════════════════════════════
//  POLLS — VOTE
// ════════════════════════════════════════════════════════
async function votePoll(pollId, optIdx) {
  if(!currentUser){ toast('Set your name first!','err'); return; }
  const voteKey=`pulse_vote_${pollId}`;
  if(localStorage.getItem(voteKey)!==null){ toast('You already voted on this poll!','inf'); return; }
  try {
    const res=await fetch(`/api/polls/${pollId}/vote`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({option_index:optIdx, voter_name:currentUser})
    });
    if(!res.ok) throw new Error(await res.text());
    localStorage.setItem(voteKey, String(optIdx));
    await loadPolls();
    toast('Vote cast! 🗳️','ok');
  } catch(e) {
    toast('Failed to vote: '+e.message,'err');
  }
}

// ════════════════════════════════════════════════════════
//  POLLS — DELETE VOTER
// ════════════════════════════════════════════════════════
async function deleteVote(pollId, voterName, btn) {
  btn.disabled = true; btn.textContent = '…';
  try {
    const res = await fetch(`/api/polls/${pollId}/voters/${encodeURIComponent(voterName)}`, {
      method: 'DELETE'
    });
    if (!res.ok) throw new Error(await res.text());
    await loadPolls();
    toast(`Removed ${voterName}'s vote`, 'inf');
  } catch(e) {
    btn.disabled = false; btn.textContent = '✕';
    toast('Failed to remove vote: ' + e.message, 'err');
  }
}

// ════════════════════════════════════════════════════════
//  POLLS — DELETE
// ════════════════════════════════════════════════════════
async function deletePoll(id) {
  try {
    const res=await fetch(`/api/polls/${id}`,{method:'DELETE'});
    if(!res.ok) throw new Error(await res.text());
    await loadPolls(); toast('Poll deleted','err');
  } catch(e) { toast('Failed to delete: '+e.message,'err'); }
}
