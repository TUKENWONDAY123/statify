// ════════════════════════════════════════════════════════
//  POLLS — HTML + RENDER
// ════════════════════════════════════════════════════════
function pollHtml(poll) {
  const total=poll.options.reduce((s,o)=>s+o.votes,0);
  const voteKey=`pulse_vote_${poll.id}`;
  const hasVoted=localStorage.getItem(voteKey)!==null;
  const chosenIdx=hasVoted?parseInt(localStorage.getItem(voteKey)):null;
  const maxVotes=Math.max(...poll.options.map(o=>o.votes));

  const anyOptHasImage = poll.options.some(o => o.image);

  const optsHtml = poll.options.map((opt, i) => {
    const pct = total > 0 ? Math.round(opt.votes / total * 100) : 0;
    const isChosen = hasVoted && chosenIdx === i;
    const isWinner = hasVoted && opt.votes === maxVotes && total > 0 && opt.votes > 0;
    const classes = ['poll-option', hasVoted?'voted':'', isChosen?'is-chosen':'', isWinner?'is-winner':'', opt.image?'with-image':''].filter(Boolean).join(' ');
    const clickAttr = hasVoted ? '' : 'onclick="votePoll('+poll.id+','+i+')"';

    if (opt.image) {
      // Image-style card option
      return '<div class="'+classes+'" '+clickAttr+'>'
        +'<div class="poll-bar" style="transform:scaleX('+(hasVoted?pct/100:0)+')"></div>'
        +'<div class="poll-option-inner">'
        +'<img class="poll-opt-img" src="'+opt.image+'" alt="'+esc(opt.text)+'" loading="lazy">'
        +'<div class="poll-opt-img-label">'
        +'<div class="poll-radio"></div>'
        +'<div class="poll-opt-text">'+esc(opt.text)+'</div>'
        +'<div class="poll-pct'+(hasVoted?' show':'')+'">'+pct+'%</div>'
        +'</div>'
        +'</div></div>';
    }

    // Regular text option
    return '<div class="'+classes+'" '+clickAttr+'>'
      +'<div class="poll-bar" style="transform:scaleX('+(hasVoted?pct/100:0)+')"></div>'
      +'<div class="poll-option-inner">'
      +'<div class="poll-radio"></div>'
      +'<div class="poll-opt-text">'+esc(opt.text)+'</div>'
      +'<div class="poll-pct'+(hasVoted?' show':'')+'">'+pct+'%</div>'
      +'</div></div>';
  }).join('');

  // Voter list for admin
  let voterListHtml = '';
  if(isAdmin) {
    const optGroups = poll.options.map((opt,i) => {
      const voters = opt.voters || [];
      const chipsHtml = voters.length
        ? voters.map(v=>`<div class="voter-chip">
            <div class="voter-chip-av" style="background:${grad(v)}">${initials(v)}</div>
            <span class="voter-chip-name">${esc(v)}</span>
            <button class="voter-chip-del" onclick="deleteVote(${poll.id},'${v.replace(/'/g,"\\'")}',this)" title="Remove vote">✕</button>
          </div>`).join('')
        : `<span class="voter-empty">No votes yet</span>`;
      return `<div class="voter-option-group">
        <div class="voter-option-name">
          ${esc(opt.text)}
          <span class="vcount">${voters.length}</span>
        </div>
        <div class="voter-chips">${chipsHtml}</div>
      </div>`;
    }).join('');

    voterListHtml = `
      <div class="voter-list" id="vl_${poll.id}">
        <div class="voter-list-title">👥 Who voted what</div>
        ${optGroups}
      </div>`;
  }

  // Poll image
  const imageHtml = poll.image
    ? `<div class="poll-image-wrap"><img src="${esc(poll.image)}" alt="Poll image" loading="lazy"></div>`
    : '';

  return `<div class="poll-card" data-poll="${poll.id}">
    ${imageHtml}
    <div class="poll-card-body">
      <div class="poll-top">
        <div class="poll-icon">📊</div>
        <div class="poll-meta">
          <div class="poll-q">${esc(poll.question)}</div>
          <div class="poll-info">By Admin · ${ago(poll.ts)} · ${total} vote${total!==1?'s':''}</div>
        </div>
        <button class="poll-del${isAdmin?' visible':''}" onclick="deletePoll(${poll.id})" title="Delete">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
      <div class="poll-options${anyOptHasImage?' has-images':''}">${optsHtml}</div>
      <div class="poll-footer">
        ${hasVoted?`<span style="color:var(--accent3)">✓ You voted</span><span class="poll-footer-dot"></span>`:''}
        <span>${total} vote${total!==1?'s':''}</span>
        ${isAdmin?`<span class="poll-footer-dot"></span><button class="toggle-voters-btn" onclick="toggleVoterList(${poll.id})">See voters</button>`:''}
      </div>
      ${voterListHtml}
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════
//  LOAD POLLS FROM API
// ════════════════════════════════════════════════════════
async function loadPolls() {
  try {
    const res=await fetch('/api/polls');
    if(!res.ok) throw new Error('Server error');
    const apiPolls=await res.json();
    polls=apiPolls.map(p=>({
      id: p.id,
      question: p.question,
      options: (p.options||[]).map(o => ({
        text:   typeof o === 'string' ? o : (o.text || ''),
        image:  typeof o === 'string' ? null : (o.image || null),
        votes:  typeof o === 'string' ? 0 : (o.votes || 0),
        voters: typeof o === 'string' ? [] : (o.voters || []),
      })),
      ts: p.created_at ? new Date((p.created_at||'').replace(' ','T')+'Z').getTime() : p.ts || Date.now(),
    }));
  } catch(e) {
    console.warn('Could not load polls from API:', e);
  }
  renderPolls();
}

function renderPolls() {
  const el=document.getElementById('pollsList'); if(!el) return;
  if(!polls.length){
    el.innerHTML=`<div class="empty"><div class="icon">📊</div><p>${isAdmin?'Create your first poll above.':'No polls yet. Check back soon!'}</p></div>`; return;
  }
  el.innerHTML=polls.map(pollHtml).join('');
  requestAnimationFrame(()=>{
    document.querySelectorAll('.poll-bar').forEach(bar=>{
      const t=bar.style.transform; bar.style.transform='scaleX(0)';
      requestAnimationFrame(()=>{ bar.style.transform=t; });
    });
  });
}

async function loadRooms() {

    const res = await fetch('/api/rooms');

      el.innerHTML = '<div class="empty"><div class="icon">💬</div><p>No rooms yet — create one!</p></div>';

        + '<div class="room-card-icon">💬</div>'

        + '<div class="room-card-name">' + esc(r.name) + '</div>'

        + (canDelete ? '<button class="room-del-btn" onclick="event.stopPropagation();deleteRoom(\'' + r.code + '\',this)" title="Delete room">'
          + '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>'
          + '</button>' : '')
        + '</div>';
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>' + esc(e.message) + '</p></div>';
  }
}

async function enterRoom(code, name) {
  const res = await fetch('/api/rooms/' + code + '/join', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: currentUser }) });
  if (!res.ok) { toast('Room not found', 'err'); return; }
  currentRoom = { code, name };
  document.getElementById('roomListView').style.display = 'none';
  const chatView = document.getElementById('roomChatView');
  chatView.classList.add('open');
  document.getElementById('roomChatName').textContent = name;
  document.getElementById('roomChatCode').textContent = code;
  lastMessageCount = 0;
  await fetchRoomMessages();
  // Start polling every 3 seconds
  clearInterval(roomPollInterval);
  roomPollInterval = setInterval(fetchRoomMessages, 3000);
  setTimeout(() => document.getElementById('roomMsgInput').focus(), 100);
}

function leaveRoomView() {
  clearInterval(roomPollInterval);
  currentRoom = null;
  document.getElementById('roomChatView').classList.remove('open');
  document.getElementById('roomListView').style.display = '';
  document.getElementById('roomMessages').innerHTML = '';
  loadRooms();
}

async function fetchRoomMessages() {
  if (!currentRoom) return;
  try {
    const res = await fetch('/api/rooms/' + currentRoom.code);
    if (!res.ok) { leaveRoomView(); toast('Room no longer exists', 'err'); return; }
    const data = await res.json();
    if (data.messages.length === lastMessageCount) return; // no new messages
    lastMessageCount = data.messages.length;
    renderRoomMessages(data.messages);
  } catch(e) { /* silent fail on poll */ }
}

function renderRoomMessages(messages) {
  const el = document.getElementById('roomMessages');
  const wasAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
  if (!messages.length) {
    el.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:0.83rem;padding:2rem 0">No messages yet. Say something! 👋</div>';
    return;
  }
  el.innerHTML = messages.map(m => {
    const mine = m.author === currentUser;
    const canDel = mine || isAdmin;
    const time = ago(new Date((m.created_at||'').replace(' ','T')+'Z').getTime());
    return '<div class="room-msg' + (mine ? ' mine' : '') + '">'
      + '<div class="room-msg-av" style="background:' + grad(m.author) + '">' + initials(m.author) + '</div>'
      + '<div class="room-msg-body">'
      + (!mine ? '<div class="room-msg-author">' + esc(m.author) + '</div>' : '')
      + '<div class="room-msg-bubble">' + rich(esc(m.content))
      + (canDel ? '<button class="room-msg-del" onclick="deleteRoomMessage(' + m.id + ',this)" title="Delete">'
        + '<svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>'
        + '</button>' : '')
      + '</div>'
      + '<div class="room-msg-time">' + time + '</div>'
      + '</div></div>';
  }).join('');
  if (wasAtBottom) el.scrollTop = el.scrollHeight;
}

async function sendRoomMessage() {
  if (!currentRoom || !currentUser) return;
  const inp = document.getElementById('roomMsgInput');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = '';
  try {
    const res = await fetch('/api/rooms/' + currentRoom.code + '/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ author: currentUser, content: txt })
    });
    if (!res.ok) throw new Error(await res.text());
    await fetchRoomMessages();
  } catch(e) {
    inp.value = txt;
    toast('Failed to send: ' + e.message, 'err');
  }
}

async function deleteRoomMessage(msgId, btn) {
  if (!currentRoom) return;
  btn.disabled = true;
  try {
    const res = await fetch('/api/rooms/' + currentRoom.code + '/messages/' + msgId, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ requester: currentUser, admin: isAdmin })
    });
    if (!res.ok) throw new Error(await res.text());
    lastMessageCount = 0; // force re-render
    await fetchRoomMessages();
  } catch(e) {
    toast('Failed to delete: ' + e.message, 'err');
  }
}

async function deleteRoom(code, btn) {
  if (!confirm('Delete this room and all its messages?')) return;
  btn.disabled = true;
  try {
    const res = await fetch('/api/rooms/' + code, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ requester: currentUser, admin: isAdmin })
    });
    if (!res.ok) throw new Error(await res.text());
    toast('Room deleted', 'inf');
    await loadRooms();
  } catch(e) {
    toast('Failed: ' + e.message, 'err');
    btn.disabled = false;
  }
}

function copyRoomCode() {
  if (!currentRoom) return;
  navigator.clipboard.writeText(currentRoom.code).then(() => toast('Code copied! ' + currentRoom.code, 'ok'));
}

// ── Create Room Modal ──
function openCreateModal() {
  document.getElementById('newRoomName').value = '';
  document.getElementById('createRoomErr').textContent = '';
  document.getElementById('createRoomForm').style.display = '';
  document.getElementById('createRoomSuccess').style.display = 'none';
  document.getElementById('createRoomModal').classList.add('open');
  setTimeout(() => document.getElementById('newRoomName').focus(), 80);
}
function closeCreateModal() {
  document.getElementById('createRoomModal').classList.remove('open');
}
async function submitCreateRoom() {
  const name = document.getElementById('newRoomName').value.trim();
  const errEl = document.getElementById('createRoomErr');
  if (!name) { errEl.textContent = 'Enter a room name.'; return; }
  const btn = document.getElementById('createRoomBtn');
  btn.disabled = true; btn.textContent = 'Creating…';
  try {
    const res = await fetch('/api/rooms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, created_by: currentUser })
    });
    if (!res.ok) throw new Error(await res.text());
    const room = await res.json();
    window._pendingRoomCode = room.code;
    window._pendingRoomName = room.name;
    document.getElementById('newRoomCode').textContent = room.code;
    document.getElementById('createRoomForm').style.display = 'none';
    document.getElementById('createRoomSuccess').style.display = '';
    loadRooms();
  } catch(e) {
    errEl.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Create';
  }
}
function copyNewRoomCode() {
  navigator.clipboard.writeText(window._pendingRoomCode || '').then(() => toast('Code copied!', 'ok'));
}
function enterRoomFromCode() {
  closeCreateModal();
  enterRoom(window._pendingRoomCode, window._pendingRoomName);
}

// ── Join Room Modal ──
function openJoinModal() {
  document.getElementById('joinRoomCode').value = '';
  document.getElementById('joinRoomErr').textContent = '';
  document.getElementById('joinRoomModal').classList.add('open');
  setTimeout(() => document.getElementById('joinRoomCode').focus(), 80);
}
function closeJoinModal() {
  document.getElementById('joinRoomModal').classList.remove('open');
}
async function submitJoinRoom() {
  const code = document.getElementById('joinRoomCode').value.trim();
  const errEl = document.getElementById('joinRoomErr');
  if (code.length !== 6) { errEl.textContent = 'Enter a valid 6-digit code.'; return; }
  const btn = document.getElementById('joinRoomBtn');
  btn.disabled = true; btn.textContent = 'Joining…';
  try {
    const res = await fetch('/api/rooms/' + code);
    if (!res.ok) { errEl.textContent = 'Room not found. Check the code.'; return; }
    const room = await res.json();
    closeJoinModal();
    enterRoom(room.code, room.name);
  } catch(e) {
    errEl.textContent = 'Network error. Try again.';
  } finally {
    btn.disabled = false; btn.textContent = 'Join →';
  }
}
</script>
</body>
